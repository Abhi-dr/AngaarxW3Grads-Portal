{% extends "instructor/base.html" %}
{% load static %}

{% block title %}
Edit MCQ Question
{% endblock %}

{% block sheet_active %}
active
{% endblock %}

{% block body %}
<div class="container-fluid">
    {% for message in messages %}
    <div class="alert {{ message.tags }} alert-dismissible fade show" role="alert">
        <strong>{{ message.tag }}</strong> {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    {% endfor %}

    <div class="card">
        <div class="card-body">
            <h5 class="card-title fw-semibold mb-4">Edit MCQ Question</h5>
            <form method="post" action="">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ next_url|default:'' }}">

                <div class="mb-3">
                    <label for="question_text" class="form-label">Question Text</label>
                    <textarea class="form-control" id="question_text" name="question_text" rows="4" required>{{ question.question_text }}</textarea>
                </div>

                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="option_a" class="form-label">Option A</label>
                        <input type="text" class="form-control" id="option_a" name="option_a" value="{{ question.option_a }}" required>
                    </div>
                    <div class="col-md-6">
                        <label for="option_b" class="form-label">Option B</label>
                        <input type="text" class="form-control" id="option_b" name="option_b" value="{{ question.option_b }}" required>
                    </div>
                    <div class="col-md-6">
                        <label for="option_c" class="form-label">Option C</label>
                        <input type="text" class="form-control" id="option_c" name="option_c" value="{{ question.option_c }}" required>
                    </div>
                    <div class="col-md-6">
                        <label for="option_d" class="form-label">Option D</label>
                        <input type="text" class="form-control" id="option_d" name="option_d" value="{{ question.option_d }}" required>
                    </div>
                </div>

                <div class="row g-3 mt-1">
                    <div class="col-md-6">
                        <label for="correct_option" class="form-label">Correct Option</label>
                        <select class="form-select" id="correct_option" name="correct_option" required>
                            <option value="A" {% if question.correct_option == 'A' %}selected{% endif %}>A</option>
                            <option value="B" {% if question.correct_option == 'B' %}selected{% endif %}>B</option>
                            <option value="C" {% if question.correct_option == 'C' %}selected{% endif %}>C</option>
                            <option value="D" {% if question.correct_option == 'D' %}selected{% endif %}>D</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label for="difficulty_level" class="form-label">Difficulty Level</label>
                        <select class="form-select" id="difficulty_level" name="difficulty_level" required>
                            <option value="Easy" {% if question.difficulty_level == 'Easy' %}selected{% endif %}>Easy</option>
                            <option value="Medium" {% if question.difficulty_level == 'Medium' %}selected{% endif %}>Medium</option>
                            <option value="Hard" {% if question.difficulty_level == 'Hard' %}selected{% endif %}>Hard</option>
                        </select>
                    </div>
                </div>

                <div class="mb-3 mt-3">
                    <label for="explanation" class="form-label">Explanation (Optional)</label>
                    <textarea class="form-control" id="explanation" name="explanation" rows="3">{{ question.explanation|default_if_none:'' }}</textarea>
                </div>

                <div class="mb-4">
                    <label for="tags" class="form-label">Tags (Optional)</label>
                    <input type="text" class="form-control" id="tags" name="tags" value="{{ question.tags|default_if_none:'' }}" placeholder="e.g. arrays, loops">
                </div>

                <button type="submit" class="btn btn-primary">Save Changes</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
