{% extends "administration/base.html" %}
{% load static %}
{% load custom_filters %}

{% block title %}
Add Hackathon
{% endblock %}

{% block hackathon_active %} 
active
{% endblock %}


{% block body %}

<div class="container-fluid">
    <div class="card">
        <div class="card-body">
            <h5 class="card-title fw-semibold mb-0">Add Hackathon</h5>
        </div>
    
        <div class="container px-4">
            <form method="POST" enctype="multipart/form-data" id="add-hackathon-form">
                {% csrf_token %}
                <hr class="mt-0">
    
                <div class="row">
                    <div class="w-100">
                        <div class="card">
                            <div class="card-header">Hackathon Details</div>
    
                            <div class="card-body h-100">
                                <div>
    
                                    <div class="mb-3">
                                        <label class="form-label">Hackathon Name <div class="star">*</div></label>
                                        <input type="text" class="form-control" name="name" placeholder="Enter hackathon name..." required>
                                    </div>
                                    
                                    <div class="row">
                                        <div class="mb-3 col-md-4">
                                            <label class="form-label">Start Date <div class="star">*</div></label>
                                            <input type="date" class="form-control" name="start_date" required>
                                        </div>
        
                                        <div class="mb-3 col-md-4">
                                            <label class="form-label">End Date <div class="star">*</div></label>
                                            <input type="date" class="form-control" name="end_date" required>
                                        </div>

                                        <div class="mb-3 col-md-4">
                                            <label class="form-label">Mode <div class="star">*</div></label>
                                            <select class="form-select form-control" name="location" required>
                                                <option value="Online">Online</option>
                                                <option value="Onsite">Onsite</option>
                                            </select>
                                        </div>
                                    </div>
    
    
                                    <div class="row">
                                        <div class="mb-3 col-md-6">
                                            <label class="form-label">Registration Deadline <div class="star">*</div></label>
                                            <input type="date" class="form-control" name="registration_deadline" required>
                                        </div>
        
                                        <div class="mb-3 col-md-6">
                                            <label class="form-label">Prize Pool <div class="star">*</div></label>
                                            <input type="text" class="form-control" name="prize_pool" placeholder="Prize amount..." required>
                                        </div>
                                    </div>
    
                                    <div class="mb-3">
                                        <label class="form-label">Hackathon Thumbnail <div class="star">*</div></label>
                                        <input type="file" class="form-control" name="thumbnail" required>
                                    </div>
    
                                    <div class="mb-3">
                                        <label class="form-label">Website URL <div class="star">*</div></label>
                                        <input type="url" class="form-control" name="website" placeholder="Enter official hackathon website..." required>
                                    </div>
    
                                </div>
    
                                <div class="col-md-12">
                                    <button type="submit" class="btn btn-success w-100 mt-3">Add Hackathon</button>
                                </div>
    
                            </div>
                        </div> 
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>


{% endblock %}
